<!DOCTYPE html>
<html>
<head>
    <title>Analyze Argument</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Argument Analysis</h2>
    <form method="POST">
        <textarea name="text" rows="5" cols="50" placeholder="Enter argument..." required></textarea>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
    <div class="chat-box">
        <div class="user-msg">You: {{ request.form['text'] }}</div>
        <div class="ai-msg">Summary: {{ result['summary'] }}</div>
        <div class="ai-msg">Stance: {{ result['stance'] }}</div>
    </div>
    {% endif %}
</body>
</html>
